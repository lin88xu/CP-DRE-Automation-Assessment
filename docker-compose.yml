version: '3.5'

services:
  # PostgreSQL Database
  kong-db:
    image: postgres:15-alpine
    container_name: kong-db
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
    ports:
      - "5432:5432"
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-network

  # Kong Gateway
  kong:
    image: kong:latest
    container_name: kong
    depends_on:
      - kong-db
    environment:
      # Database Configuration - Using DB-less mode for easier local development
      KONG_DATABASE: "off"
      # Uncomment below to use PostgreSQL instead
      # KONG_DATABASE: postgres
      # KONG_PG_HOST: kong-db
      # KONG_PG_PORT: 5432
      # KONG_PG_USER: kong
      # KONG_PG_PASSWORD: kong
      # KONG_PG_DATABASE: kong
      # KONG_PG_SCHEMA: kong
      
      # Proxy Settings
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      
      # Admin API Settings
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      
      # Manager UI (Admin GUI)
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_AUTH: basic-auth
      KONG_ADMIN_GUI_AUTH_CONF: '{"secret":"kong-secret"}'
      KONG_ADMIN_GUI_SESSION_CONF: '{"secret":"kong-session-secret"}'
      KONG_ENFORCE_RBAC: "off"
      
      # Logging & Debugging
      KONG_LOG_LEVEL: info
      
      # Prefix
      KONG_PREFIX: /usr/local/kong
      
      # DB-less mode configuration
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_DECLARATIVE_CONFIG_ENCODED: "false"
    ports:
      - "8000:8000"  # Proxy (HTTP)
      - "8001:8001"  # Admin API (HTTP)
      - "8002:8002"  # Manager UI (Frontend)
    volumes:
      - kong-data:/usr/local/kong
      - ./kong.yml:/etc/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-network
    command: "kong docker-start"

volumes:
  kong-db-data:
    driver: local
  kong-data:
    driver: local

networks:
  kong-network:
    driver: bridge

# Quick reference:
# - Proxy: http://localhost:8000
# - Admin API: http://localhost:8001
# - Manager UI: http://localhost:8002
# Default credentials:
# - Username: kong
# - Password: kong-secret
