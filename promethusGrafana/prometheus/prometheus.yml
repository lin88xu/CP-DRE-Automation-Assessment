global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: kong-admin
    metrics_path: /metrics
    static_configs:
      - targets:
          - kong:8001
        labels:
          environment: local
          scrape_target: kong
