services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: assessment-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_BIND_HOST:-127.0.0.1}:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - default
      - kong-observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.3
    container_name: assessment-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-grafana-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-grafana-admin-dev-password}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_BIND_HOST:-127.0.0.1}:3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../kong/kong/plugins/prometheus/grafana:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - default
      - kong-observability
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  kong-observability:
    external: true
    name: assessment-kong-network
