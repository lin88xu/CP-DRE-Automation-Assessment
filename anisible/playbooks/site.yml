- name: Configure Kong assessment host
  hosts: kong_hosts
  become: true
  vars:
    effective_deployment_runtime: "{{ 'local' if ansible_connection == 'local' and deployment_runtime == 'docker_compose' else deployment_runtime }}"
    ansible_secret_cache_root: >-
      {{
        lookup('env', 'ANSIBLE_SECRET_CACHE_DIR')
        | default(playbook_dir ~ '/../.secrets', true)
      }}
    ansible_secret_cache_dir: "{{ ansible_secret_cache_root }}/{{ inventory_hostname }}"
  tasks:
    - name: Create controller-side secret cache root
      delegate_to: localhost
      become: false
      ansible.builtin.file:
        path: "{{ ansible_secret_cache_root }}"
        state: directory
        mode: "0700"

    - name: Create controller-side secret cache directory
      delegate_to: localhost
      become: false
      ansible.builtin.file:
        path: "{{ ansible_secret_cache_dir }}"
        state: directory
        mode: "0700"

    - name: Resolve generated management secrets
      no_log: true
      ansible.builtin.set_fact:
        observability_grafana_admin_user: >-
          {{
            lookup('env', 'GRAFANA_ADMIN_USER')
            | default(observability_grafana_admin_user | default('grafana-admin', true), true)
          }}
        observability_grafana_admin_password: >-
          {{
            lookup('env', 'GRAFANA_ADMIN_PASSWORD')
            | default(
                observability_grafana_admin_password
                | default(
                    lookup('password', ansible_secret_cache_dir + '/grafana_admin_password length=32 chars=ascii_letters,digits'),
                    true
                  ),
                true
              )
          }}
        kong_admin_gui_auth_secret: >-
          {{
            lookup('env', 'KONG_ADMIN_GUI_AUTH_SECRET')
            | default(
                kong_admin_gui_auth_secret
                | default(
                    lookup('password', ansible_secret_cache_dir + '/kong_admin_gui_auth_secret length=64 chars=ascii_letters,digits'),
                    true
                  ),
                true
              )
          }}
        kong_admin_gui_session_secret: >-
          {{
            lookup('env', 'KONG_ADMIN_GUI_SESSION_SECRET')
            | default(
                kong_admin_gui_session_secret
                | default(
                    lookup('password', ansible_secret_cache_dir + '/kong_admin_gui_session_secret length=64 chars=ascii_letters,digits'),
                    true
                  ),
                true
              )
          }}
        kong_postgres_password: >-
          {{
            lookup('env', 'KONG_PG_PASSWORD')
            | default(
                kong_postgres_password
                | default(
                    lookup('password', ansible_secret_cache_dir + '/kong_postgres_password length=32 chars=ascii_letters,digits'),
                    true
                  ),
                true
              )
          }}

    - name: Ensure Docker is available for local runtime
      ansible.builtin.import_role:
        name: docker
      when: effective_deployment_runtime in ["local", "minikube"]
      tags:
        - docker

    - name: Resolve local runtime execution user
      ansible.builtin.set_fact:
        minikube_exec_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
      when: effective_deployment_runtime in ["local", "minikube"]

    - name: Resolve local runtime execution user home
      ansible.builtin.command: getent passwd "{{ minikube_exec_user }}"
      register: minikube_exec_passwd
      changed_when: false
      when: effective_deployment_runtime in ["local", "minikube"]

    - name: Set local runtime execution facts
      ansible.builtin.set_fact:
        minikube_exec_home: "{{ minikube_exec_passwd.stdout.split(':')[5] }}"
        minikube_exec_kubeconfig: "{{ minikube_exec_passwd.stdout.split(':')[5] }}/.kube/config"
      when: effective_deployment_runtime in ["local", "minikube"]

    - name: Deploy autoscaled Kong stack with local runtime
      ansible.builtin.import_role:
        name: minikube
      when: effective_deployment_runtime in ["local", "minikube"]
      tags:
        - local
        - kong

    - name: Resolve local runtime cluster IP
      ansible.builtin.command: minikube ip -p "{{ minikube_profile }}"
      register: minikube_ip
      changed_when: false
      failed_when: false
      when: effective_deployment_runtime in ["local", "minikube"]
      become: true
      become_user: "{{ minikube_exec_user }}"
      environment:
        HOME: "{{ minikube_exec_home }}"
        KUBECONFIG: "{{ minikube_exec_kubeconfig }}"
        CHANGE_MINIKUBE_NONE_USER: "true"

    - name: Set local runtime access facts
      ansible.builtin.set_fact:
        local_runtime_public_host: >-
          {{
            (minikube_ip.stdout | trim)
            if (minikube_ip.rc | default(1)) == 0
            else minikube_public_host
          }}
        local_runtime_browser_host: >-
          {{
            (minikube_ip.stdout | trim)
            if (minikube_ip.rc | default(1)) == 0
            else minikube_profile
          }}
      when: effective_deployment_runtime in ["local", "minikube"]

    - name: Print local runtime access URLs
      ansible.builtin.debug:
        msg:
          - >-
            proxy_url=http://{{ local_runtime_public_host }}:{{ minikube_kong_proxy_nodeport }}
          - >-
            admin_url=kubectl -n {{ minikube_namespace }} port-forward svc/kong {{ kong_admin_port }}:8001
          - >-
            manager_url=kubectl -n {{ minikube_namespace }} port-forward svc/kong {{ kong_manager_port }}:8002
          - >-
            prometheus_url=kubectl -n {{ minikube_namespace }} port-forward svc/prometheus {{ observability_prometheus_port }}:9090
          - >-
            grafana_url=kubectl -n {{ minikube_namespace }} port-forward svc/grafana {{ observability_grafana_port }}:3000
          - "grafana_login={{ observability_grafana_admin_user }}/{{ observability_grafana_admin_password }}"
      when:
        - effective_deployment_runtime in ["local", "minikube"]
        - not (ansible_connection == "local" and minikube_driver == "docker")

    - name: Print local runtime localhost access instructions
      ansible.builtin.debug:
        msg:
          - >-
            The local runtime uses Minikube with the docker driver, so
            {{ local_runtime_browser_host }} is not directly reachable from your browser.
          - "Use localhost port-forwards instead:"
          - "grafana_port_forward=kubectl -n {{ minikube_namespace }} port-forward svc/grafana 3000:3000"
          - "prometheus_port_forward=kubectl -n {{ minikube_namespace }} port-forward svc/prometheus 9090:9090"
          - >-
            kong_port_forward=kubectl -n {{ minikube_namespace }}
            port-forward svc/kong 8000:8000 8001:8001 8002:8002
          - "proxy_nodeport=http://{{ local_runtime_public_host }}:{{ minikube_kong_proxy_nodeport }}"
          - "grafana_url=http://127.0.0.1:3000"
          - "prometheus_url=http://127.0.0.1:9090"
          - "proxy_url=http://127.0.0.1:8000"
          - "admin_url=http://127.0.0.1:8001"
          - "manager_url=http://127.0.0.1:8002"
          - "grafana_login={{ observability_grafana_admin_user }}/{{ observability_grafana_admin_password }}"
      when:
        - effective_deployment_runtime in ["local", "minikube"]
        - ansible_connection == "local"
        - minikube_driver == "docker"
