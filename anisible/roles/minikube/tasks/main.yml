- name: Bootstrap python3-apt for Debian-based hosts
  ansible.builtin.raw: |
    set -e
    python3 -c "import apt" >/dev/null 2>&1 && exit 0
    export DEBIAN_FRONTEND=noninteractive
    apt-get -o Acquire::AllowReleaseInfoChange=true -o Acquire::AllowReleaseInfoChange::Label=true update
    apt-get install -y python3-apt
  changed_when: false

- name: Install Minikube prerequisites
  ansible.builtin.raw: |
    set -e
    export DEBIAN_FRONTEND=noninteractive
    missing_packages=""
    for package in conntrack curl ca-certificates socat; do
      dpkg -s "$package" >/dev/null 2>&1 || missing_packages="$missing_packages $package"
    done
    if [ -n "$missing_packages" ]; then
      apt-get -o Acquire::AllowReleaseInfoChange=true -o Acquire::AllowReleaseInfoChange::Label=true update
      apt-get install -y $missing_packages
      echo changed
    fi
  register: minikube_prereqs_install
  changed_when: "'changed' in minikube_prereqs_install.stdout"

- name: Check whether kubectl is already available
  ansible.builtin.command: kubectl version --client=true --output=yaml
  register: kubectl_check
  changed_when: false
  failed_when: false

- name: Install kubectl
  ansible.builtin.shell: |
    set -euo pipefail
    version="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
    tmp_file="$(mktemp)"
    curl -fsSL -o "$tmp_file" "https://dl.k8s.io/release/${version}/bin/linux/amd64/kubectl"
    install -m 0755 "$tmp_file" /usr/local/bin/kubectl
    rm -f "$tmp_file"
  args:
    executable: /bin/bash
  when: kubectl_check.rc != 0
  changed_when: true

- name: Check whether Minikube is already available
  ansible.builtin.command: minikube version --short
  register: minikube_binary_check
  changed_when: false
  failed_when: false

- name: Install Minikube
  ansible.builtin.shell: |
    set -euo pipefail
    tmp_file="$(mktemp)"
    curl -fsSL -o "$tmp_file" https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
    install -m 0755 "$tmp_file" /usr/local/bin/minikube
    rm -f "$tmp_file"
  args:
    executable: /bin/bash
  when: minikube_binary_check.rc != 0
  changed_when: true

- name: Create Minikube working directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ minikube_install_root }}"
    - "{{ minikube_install_root }}/manifests"

- name: Ensure Minikube user directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ minikube_exec_user }}"
    group: "{{ minikube_exec_user }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ minikube_exec_home }}/.minikube"
      mode: "0755"
    - path: "{{ minikube_exec_home }}/.kube"
      mode: "0700"

- name: Render Minikube namespace manifest
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../minikube/manifests/namespace.yml.j2"
    dest: "{{ minikube_install_root }}/manifests/namespace.yml"
    mode: "0644"

- name: Render Minikube Kong ConfigMap manifest
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../minikube/manifests/kong-configmap.yml.j2"
    dest: "{{ minikube_install_root }}/manifests/kong-configmap.yml"
    mode: "0644"

- name: Render Minikube PostgreSQL manifest
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../minikube/manifests/postgres.yml.j2"
    dest: "{{ minikube_install_root }}/manifests/postgres.yml"
    mode: "0644"

- name: Render Minikube Kong bootstrap manifest
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../minikube/manifests/kong-bootstrap.yml.j2"
    dest: "{{ minikube_install_root }}/manifests/kong-bootstrap.yml"
    mode: "0644"

- name: Render Minikube Kong workload manifest
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../minikube/manifests/kong.yml.j2"
    dest: "{{ minikube_install_root }}/manifests/kong.yml"
    mode: "0644"

- name: Render Minikube upstream manifest
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../minikube/manifests/httpbin.yml.j2"
    dest: "{{ minikube_install_root }}/manifests/httpbin.yml"
    mode: "0644"

- name: Render Minikube Prometheus ConfigMap manifest
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../minikube/manifests/prometheus-configmap.yml.j2"
    dest: "{{ minikube_install_root }}/manifests/prometheus-configmap.yml"
    mode: "0644"

- name: Render Minikube Prometheus workload manifest
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../minikube/manifests/prometheus.yml.j2"
    dest: "{{ minikube_install_root }}/manifests/prometheus.yml"
    mode: "0644"

- name: Render Minikube Grafana ConfigMap manifest
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../minikube/manifests/grafana-configmap.yml.j2"
    dest: "{{ minikube_install_root }}/manifests/grafana-configmap.yml"
    mode: "0644"

- name: Render Minikube Grafana workload manifest
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../minikube/manifests/grafana.yml.j2"
    dest: "{{ minikube_install_root }}/manifests/grafana.yml"
    mode: "0644"

- name: Check Minikube profile status
  ansible.builtin.command: minikube status -p "{{ minikube_profile }}"
  register: minikube_status
  changed_when: false
  failed_when: false
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"
    CHANGE_MINIKUBE_NONE_USER: "true"

- name: Check for legacy root-owned Minikube profile
  ansible.builtin.stat:
    path: "/root/.minikube/profiles/{{ minikube_profile }}"
  register: root_minikube_profile
  when: minikube_exec_user != "root"

- name: Delete legacy root-owned Minikube profile
  ansible.builtin.command: minikube delete -p "{{ minikube_profile }}"
  when:
    - minikube_exec_user != "root"
    - root_minikube_profile.stat.exists
  changed_when: true
  failed_when: false
  environment:
    HOME: /root
    KUBECONFIG: /root/.kube/config
    CHANGE_MINIKUBE_NONE_USER: "true"

- name: Start Minikube cluster
  ansible.builtin.command:
    argv:
      - minikube
      - start
      - -p
      - "{{ minikube_profile }}"
      - --driver={{ minikube_driver }}
      - --cpus={{ minikube_cpus }}
      - --memory={{ minikube_memory_mb }}
      - --addons=metrics-server,ingress
      - --force
  when: minikube_status.rc != 0
  changed_when: true
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"
    CHANGE_MINIKUBE_NONE_USER: "true"

- name: Ensure Minikube addons are enabled
  ansible.builtin.command:
    argv:
      - minikube
      - addons
      - enable
      - "{{ item }}"
      - -p
      - "{{ minikube_profile }}"
  loop:
    - metrics-server
    - ingress
    - default-storageclass
    - storage-provisioner
  changed_when: false
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"
    CHANGE_MINIKUBE_NONE_USER: "true"

- name: Apply Minikube namespace manifest
  ansible.builtin.command: kubectl apply -f "{{ minikube_install_root }}/manifests/namespace.yml"
  register: minikube_namespace_apply
  changed_when: "'created' in minikube_namespace_apply.stdout or 'configured' in minikube_namespace_apply.stdout"
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"

- name: Apply Minikube shared manifests
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -f
      - "{{ item }}"
  loop:
    - "{{ minikube_install_root }}/manifests/kong-configmap.yml"
    - "{{ minikube_install_root }}/manifests/httpbin.yml"
    - "{{ minikube_install_root }}/manifests/postgres.yml"
    - "{{ minikube_install_root }}/manifests/prometheus-configmap.yml"
    - "{{ minikube_install_root }}/manifests/grafana-configmap.yml"
  register: minikube_shared_apply
  changed_when: true
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"

- name: Wait for PostgreSQL deployment rollout
  ansible.builtin.command: kubectl -n "{{ minikube_namespace }}" rollout status deployment/{{ kong_postgres_service_name }} --timeout={{ minikube_postgres_rollout_timeout }}
  changed_when: false
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"

- name: Delete previous Kong bootstrap job
  ansible.builtin.command: kubectl -n "{{ minikube_namespace }}" delete job kong-bootstrap --ignore-not-found
  changed_when: false
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"

- name: Apply Kong bootstrap job manifest
  ansible.builtin.command: kubectl apply -f "{{ minikube_install_root }}/manifests/kong-bootstrap.yml"
  register: minikube_kong_bootstrap_apply
  changed_when: true
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"

- name: Wait for Kong bootstrap job completion
  block:
    - name: Wait for Kong bootstrap job completion
      ansible.builtin.command: kubectl -n "{{ minikube_namespace }}" wait --for=condition=complete job/kong-bootstrap --timeout={{ minikube_kong_bootstrap_timeout }}
      register: minikube_kong_bootstrap_wait
      changed_when: false
      become_user: "{{ minikube_exec_user }}"
      environment:
        HOME: "{{ minikube_exec_home }}"
        KUBECONFIG: "{{ minikube_exec_kubeconfig }}"
  rescue:
    - name: Capture Kong bootstrap job details
      ansible.builtin.command: kubectl -n "{{ minikube_namespace }}" get job kong-bootstrap -o yaml
      register: minikube_kong_bootstrap_job_details
      changed_when: false
      failed_when: false
      become_user: "{{ minikube_exec_user }}"
      environment:
        HOME: "{{ minikube_exec_home }}"
        KUBECONFIG: "{{ minikube_exec_kubeconfig }}"

    - name: Capture Kong bootstrap pod details
      ansible.builtin.command: kubectl -n "{{ minikube_namespace }}" get pods -l job-name=kong-bootstrap -o wide
      register: minikube_kong_bootstrap_pod_details
      changed_when: false
      failed_when: false
      become_user: "{{ minikube_exec_user }}"
      environment:
        HOME: "{{ minikube_exec_home }}"
        KUBECONFIG: "{{ minikube_exec_kubeconfig }}"

    - name: Capture Kong bootstrap job logs
      ansible.builtin.command: kubectl -n "{{ minikube_namespace }}" logs job/kong-bootstrap --tail=200
      register: minikube_kong_bootstrap_logs
      changed_when: false
      failed_when: false
      become_user: "{{ minikube_exec_user }}"
      environment:
        HOME: "{{ minikube_exec_home }}"
        KUBECONFIG: "{{ minikube_exec_kubeconfig }}"

    - name: Fail with Kong bootstrap diagnostics
      ansible.builtin.fail:
        msg: |
          Kong bootstrap job did not complete within {{ minikube_kong_bootstrap_timeout }}.
          kubectl wait stderr:
          {{ minikube_kong_bootstrap_wait.stderr | default('unavailable', true) }}

          Job details:
          {{ minikube_kong_bootstrap_job_details.stdout | default('unavailable', true) }}

          Pod details:
          {{ minikube_kong_bootstrap_pod_details.stdout | default('unavailable', true) }}

          Job logs:
          {{ minikube_kong_bootstrap_logs.stdout | default(minikube_kong_bootstrap_logs.stderr, true) | default('unavailable', true) }}

- name: Apply Minikube runtime manifests
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -f
      - "{{ item }}"
  loop:
    - "{{ minikube_install_root }}/manifests/kong.yml"
    - "{{ minikube_install_root }}/manifests/prometheus.yml"
    - "{{ minikube_install_root }}/manifests/grafana.yml"
  register: minikube_runtime_apply
  changed_when: true
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"

- name: Wait for sample upstream deployment rollout
  ansible.builtin.command: kubectl -n "{{ minikube_namespace }}" rollout status deployment/httpbin --timeout={{ minikube_httpbin_rollout_timeout }}
  changed_when: false
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"

- name: Wait for Kong deployment rollout
  ansible.builtin.command: kubectl -n "{{ minikube_namespace }}" rollout status deployment/kong --timeout={{ minikube_kong_rollout_timeout }}
  changed_when: false
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"

- name: Wait for Prometheus deployment rollout
  ansible.builtin.command: kubectl -n "{{ minikube_namespace }}" rollout status deployment/prometheus --timeout={{ minikube_prometheus_rollout_timeout }}
  changed_when: false
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"

- name: Wait for Grafana deployment rollout
  ansible.builtin.command: kubectl -n "{{ minikube_namespace }}" rollout status deployment/grafana --timeout={{ minikube_grafana_rollout_timeout }}
  changed_when: false
  become_user: "{{ minikube_exec_user }}"
  environment:
    HOME: "{{ minikube_exec_home }}"
    KUBECONFIG: "{{ minikube_exec_kubeconfig }}"
