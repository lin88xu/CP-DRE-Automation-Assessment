services:
  # PostgreSQL Database
  kong-db:
    image: postgres:15-alpine
    container_name: kong-db
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong", "-d", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      kong-network:
        aliases:
          - kong

  kong-bootstrap:
    image: kong:latest
    container_name: kong-bootstrap
    depends_on:
      kong-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:-change-me}
      KONG_PG_DATABASE: kong
      KONG_LOG_LEVEL: info
    volumes:
      - ./docker-kong.yml:/etc/kong/docker-kong.yml:ro
    networks:
      - kong-network
    restart: "no"
    command:
      - /bin/sh
      - -ec
      - |
        if ! kong migrations bootstrap; then
          kong migrations up -y || true
          kong migrations finish -y || true
        fi
        kong config db_import /etc/kong/docker-kong.yml

  kong:
    image: kong:latest
    container_name: kong
    depends_on:
      kong-db:
        condition: service_healthy
      kong-bootstrap:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:-change-me}
      KONG_PG_DATABASE: kong

      # Proxy Settings
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000

      # Admin API Settings
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001

      # Manager UI (Admin GUI)
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_AUTH: basic-auth
      KONG_ADMIN_GUI_AUTH_CONF: '${KONG_ADMIN_GUI_AUTH_CONF:-{"secret":"local-dev-kong-admin-secret"}}'
      KONG_ADMIN_GUI_SESSION_CONF: '${KONG_ADMIN_GUI_SESSION_CONF:-{"secret":"local-dev-kong-session-secret"}}'
      KONG_ENFORCE_RBAC: "off"

      # Logging & Debugging
      KONG_LOG_LEVEL: info

      # Prefix
      KONG_PREFIX: /usr/local/kong
    ports:
      - "8000:8000"  # Proxy (HTTP)
      - "127.0.0.1:8001:8001"  # Admin API (HTTP)
      - "127.0.0.1:8002:8002"  # Manager UI (Frontend)
    volumes:
      - kong-data:/usr/local/kong
      - ./docker-kong.yml:/etc/kong/docker-kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-network
    command: ["kong", "docker-start"]

volumes:
  kong-db-data:
    driver: local
  kong-data:
    driver: local

networks:
  kong-network:
    driver: bridge
    name: assessment-kong-network
