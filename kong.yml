_format_version: "3.0"
_transform: true

services:
  - name: sample-service
    url: http://httpbin.org
    protocol: http
    port: 80
    enabled: true
    routes:
      - name: sample-route
        paths:
          - /
        strip_path: false
        hosts:
          - example.com
        methods:
          - GET
          - POST
          - PUT
          - DELETE

  - name: api-service
    url: http://httpbin.org/api
    protocol: http
    port: 80
    enabled: true
    routes:
      - name: api-route
        paths:
          - /api
        strip_path: true
        methods:
          - GET
          - POST

consumers:
  - username: demo-user
    custom_id: USER-001

  - username: test-user
    custom_id: USER-002

plugins:
  - name: key-auth
    service: sample-service
    config:
      key_names:
        - apikey
      key_in_body: false
      hide_credentials: true

  - name: rate-limiting
    service: api-service
    config:
      minute: 100
      hour: 1000
      policy: local

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
      headers:
        - Content-Type
        - Authorization
      credentials: true
      max_age: 3600

  - name: request-transformer
    service: sample-service
    config:
      add:
        headers:
          - "X-Demo: true"
