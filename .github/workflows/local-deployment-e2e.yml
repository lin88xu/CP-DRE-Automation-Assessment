name: Local Deployment E2E

on:
  push:
    paths:
      - ".github/workflows/local-deployment-e2e.yml"
      - "anisible/**"
      - "terraform/**"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/local-deployment-e2e.yml"
      - "anisible/**"
      - "terraform/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-deployment:
    name: Local Deployment End-to-End
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create artifact directory
        run: mkdir -p ci-artifacts/local-deployment

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: anisible/requirements.txt

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Ansible tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r anisible/requirements.txt

      - name: Record Docker environment
        run: |
          docker version > ci-artifacts/local-deployment/docker-version.log
          docker compose version > ci-artifacts/local-deployment/docker-compose-version.log

      - name: Stop any pre-existing local stacks
        run: |
          if [ -f /opt/kong/docker-compose.yml ]; then
            sudo docker compose -f /opt/kong/docker-compose.yml down -v || true
          fi
          if [ -f /opt/observability/docker-compose.yml ]; then
            sudo docker compose -f /opt/observability/docker-compose.yml down -v || true
          fi

      - name: Terraform init
        id: terraform_init
        run: |
          set -o pipefail
          terraform -chdir=terraform/environments/local init -backend=false \
            | tee ci-artifacts/local-deployment/terraform-init.log

      - name: Terraform validate
        id: terraform_validate
        run: |
          set -o pipefail
          terraform -chdir=terraform/environments/local validate \
            | tee ci-artifacts/local-deployment/terraform-validate.log

      - name: Terraform plan
        id: terraform_plan
        run: |
          set -o pipefail
          terraform -chdir=terraform/environments/local plan -out=tfplan \
            | tee ci-artifacts/local-deployment/terraform-plan.log
          terraform -chdir=terraform/environments/local show -no-color tfplan \
            > ci-artifacts/local-deployment/terraform-plan.txt

      - name: Terraform apply local handoff
        id: terraform_apply
        run: |
          set -o pipefail
          terraform -chdir=terraform/environments/local apply -auto-approve tfplan \
            | tee ci-artifacts/local-deployment/terraform-apply.log
          terraform -chdir=terraform/environments/local output -json \
            > ci-artifacts/local-deployment/terraform-outputs.json

      - name: Run local Ansible deployment layer
        id: ansible_deploy
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/anisible/ansible.cfg
          ANSIBLE_ROLES_PATH: ${{ github.workspace }}/anisible/roles
          ANSIBLE_NOCOWS: "1"
        run: |
          set -o pipefail
          inventory_path="$(terraform -chdir=terraform/environments/local output -raw inventory_file)"
          vars_path="$(terraform -chdir=terraform/environments/local output -raw vars_file)"
          (
            cd anisible
            ansible-playbook -i "$inventory_path" playbooks/site.yml -e "@$vars_path"
          ) | tee ci-artifacts/local-deployment/ansible-playbook.log

      - name: Wait for Kong
        id: kong_checks
        run: |
          python3 - <<'PY'
          import json
          import time
          import urllib.request

          artifact_dir = "ci-artifacts/local-deployment"

          def wait_for(url, timeout=180, headers=None):
              deadline = time.time() + timeout
              last_error = None
              while time.time() < deadline:
                  request = urllib.request.Request(url, headers=headers or {})
                  try:
                      with urllib.request.urlopen(request, timeout=5) as response:
                          return response.read().decode()
                  except Exception as exc:
                      last_error = exc
                  time.sleep(3)
              raise SystemExit(f"Timed out waiting for {url}: {last_error}")

          status_body = wait_for("http://localhost:8001/status")
          metrics_body = wait_for("http://localhost:8001/metrics")
          proxy_body = wait_for(
              "http://localhost:8000/get",
              headers={"Host": "example.com"},
          )

          with open(f"{artifact_dir}/kong-status.json", "w", encoding="utf-8") as handle:
              handle.write(status_body)
          with open(f"{artifact_dir}/kong-metrics.txt", "w", encoding="utf-8") as handle:
              handle.write(metrics_body)
          with open(f"{artifact_dir}/kong-proxy-response.json", "w", encoding="utf-8") as handle:
              handle.write(proxy_body)

          if "kong_" not in metrics_body:
              raise SystemExit("Kong metrics endpoint did not expose Kong metrics")

          parsed_proxy = json.loads(proxy_body)
          if not parsed_proxy.get("url", "").endswith("/get"):
              raise SystemExit("Kong proxy did not return the expected upstream response")
          PY

      - name: Wait for Prometheus and Grafana
        id: observability_checks
        run: |
          python3 - <<'PY'
          import json
          import time
          import urllib.parse
          import urllib.request

          artifact_dir = "ci-artifacts/local-deployment"

          def fetch_json(url):
              with urllib.request.urlopen(url, timeout=5) as response:
                  return json.loads(response.read().decode())

          deadline = time.time() + 240
          grafana_payload = None
          targets_payload = None
          query_payload = None

          while time.time() < deadline:
              try:
                  grafana_payload = fetch_json("http://localhost:3000/api/health")
              except Exception:
                  grafana_payload = None

              try:
                  targets_payload = fetch_json("http://localhost:9090/api/v1/targets")
              except Exception:
                  targets_payload = None

              try:
                  query = urllib.parse.quote('up{job="kong-admin",scrape_target="kong"}')
                  query_payload = fetch_json(f"http://localhost:9090/api/v1/query?query={query}")
              except Exception:
                  query_payload = None

              grafana_ok = grafana_payload is not None and grafana_payload.get("database") == "ok"
              prometheus_ok = False
              query_ok = False

              if targets_payload is not None:
                  active = targets_payload.get("data", {}).get("activeTargets", [])
                  prometheus_ok = any(
                      target.get("labels", {}).get("job") == "kong-admin"
                      and target.get("health") == "up"
                      for target in active
                  )

              if query_payload is not None:
                  results = query_payload.get("data", {}).get("result", [])
                  query_ok = any(
                      len(result.get("value", [])) >= 2 and result["value"][1] == "1"
                      for result in results
                  )

              if grafana_ok and prometheus_ok and query_ok:
                  break

              time.sleep(5)

          if grafana_payload is not None:
              with open(f"{artifact_dir}/grafana-health.json", "w", encoding="utf-8") as handle:
                  json.dump(grafana_payload, handle, indent=2)
          if targets_payload is not None:
              with open(f"{artifact_dir}/prometheus-targets.json", "w", encoding="utf-8") as handle:
                  json.dump(targets_payload, handle, indent=2)
          if query_payload is not None:
              with open(f"{artifact_dir}/prometheus-up-query.json", "w", encoding="utf-8") as handle:
                  json.dump(query_payload, handle, indent=2)

          if grafana_payload is None or grafana_payload.get("database") != "ok":
              raise SystemExit("Grafana health check failed")

          active = targets_payload.get("data", {}).get("activeTargets", []) if targets_payload else []
          prometheus_ok = any(
              target.get("labels", {}).get("job") == "kong-admin"
              and target.get("health") == "up"
              for target in active
          )
          if not prometheus_ok:
              raise SystemExit("Prometheus never observed kong-admin as up")

          results = query_payload.get("data", {}).get("result", []) if query_payload else []
          query_ok = any(
              len(result.get("value", [])) >= 2 and result["value"][1] == "1"
              for result in results
          )
          if not query_ok:
              raise SystemExit('Prometheus query for up{job="kong-admin",scrape_target="kong"} never returned 1')
          PY

      - name: Capture deployed configuration
        if: always()
        run: |
          if [ -d terraform/environments/local/generated ]; then
            cp -R terraform/environments/local/generated ci-artifacts/local-deployment/terraform-generated
          fi
          if [ -d /opt/kong ]; then
            sudo cp -R /opt/kong ci-artifacts/local-deployment/rendered-kong
          fi
          if [ -d /opt/observability ]; then
            sudo cp -R /opt/observability ci-artifacts/local-deployment/rendered-observability
          fi

      - name: Record container status
        if: always()
        run: docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' > ci-artifacts/local-deployment/docker-ps.log

      - name: Record Kong logs
        if: always()
        run: |
          if [ -f /opt/kong/docker-compose.yml ]; then
            sudo docker compose -f /opt/kong/docker-compose.yml logs --no-color > ci-artifacts/local-deployment/kong-logs.log || true
          fi

      - name: Record observability logs
        if: always()
        run: |
          if [ -f /opt/observability/docker-compose.yml ]; then
            sudo docker compose -f /opt/observability/docker-compose.yml logs --no-color > ci-artifacts/local-deployment/observability-logs.log || true
          fi

      - name: Write deployment summary
        if: always()
        env:
          TERRAFORM_INIT: ${{ steps.terraform_init.conclusion }}
          TERRAFORM_VALIDATE: ${{ steps.terraform_validate.conclusion }}
          TERRAFORM_PLAN: ${{ steps.terraform_plan.conclusion }}
          TERRAFORM_APPLY: ${{ steps.terraform_apply.conclusion }}
          ANSIBLE_DEPLOY: ${{ steps.ansible_deploy.conclusion }}
          KONG_CHECKS: ${{ steps.kong_checks.conclusion }}
          OBSERVABILITY_CHECKS: ${{ steps.observability_checks.conclusion }}
        run: |
          status_text() {
            if [ "$1" = "success" ]; then
              printf 'PASS'
            elif [ "$1" = "skipped" ] || [ -z "$1" ]; then
              printf 'SKIP'
            else
              printf 'FAIL'
            fi
          }

          {
            echo "## Local Deployment End-to-End Summary"
            echo
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| Terraform init | $(status_text "$TERRAFORM_INIT") |"
            echo "| Terraform validate | $(status_text "$TERRAFORM_VALIDATE") |"
            echo "| Terraform plan | $(status_text "$TERRAFORM_PLAN") |"
            echo "| Terraform apply handoff | $(status_text "$TERRAFORM_APPLY") |"
            echo "| Ansible local deployment layer | $(status_text "$ANSIBLE_DEPLOY") |"
            echo "| Kong proxy, Admin API, and metrics | $(status_text "$KONG_CHECKS") |"
            echo "| Prometheus scrape and Grafana health | $(status_text "$OBSERVABILITY_CHECKS") |"
            echo
            echo "Artifacts: \`local-deployment-logs\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop local stacks
        if: always()
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/anisible/ansible.cfg
          ANSIBLE_ROLES_PATH: ${{ github.workspace }}/anisible/roles
          ANSIBLE_NOCOWS: "1"
        run: |
          if [ -f terraform/environments/local/generated/hosts.yml ] && [ -f terraform/environments/local/generated/terraform-ansible-vars.yml ]; then
            (
              cd anisible
              ansible-playbook \
                -i ../terraform/environments/local/generated/hosts.yml \
                playbooks/teardown.yml \
                -e @../terraform/environments/local/generated/terraform-ansible-vars.yml
            ) > ci-artifacts/local-deployment/ansible-teardown.log 2>&1 || true
          else
            if [ -f /opt/kong/docker-compose.yml ]; then
              sudo docker compose -f /opt/kong/docker-compose.yml down -v || true
            fi
            if [ -f /opt/observability/docker-compose.yml ]; then
              sudo docker compose -f /opt/observability/docker-compose.yml down -v || true
            fi
          fi

      - name: Destroy Terraform local handoff
        if: always()
        run: |
          terraform -chdir=terraform/environments/local destroy -auto-approve \
            > ci-artifacts/local-deployment/terraform-destroy.log 2>&1 || true

      - name: Upload deployment logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-deployment-logs
          path: ci-artifacts/local-deployment
          if-no-files-found: error
