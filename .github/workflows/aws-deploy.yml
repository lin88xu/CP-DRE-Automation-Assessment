name: AWS Deploy

on:
  push:
    branches:
      - release/aws-observability
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: aws-deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  TFC_HOST: app.terraform.io
  TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || 'CP-DRE' }}
  TFC_WORKSPACE: ${{ vars.TFC_AWS_WORKSPACE || 'cp-dre-aws' }}
  TFC_TOKEN: ${{ secrets.TF_API_TOKEN }}

jobs:
  gate:
    name: Wait For Required Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      sha: ${{ steps.check.outputs.sha }}
      branch: ${{ steps.check.outputs.branch }}

    steps:
      - name: Check upstream workflow results for this commit
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const required = ["Terraform CI", "Ansible CI", "Observability Smoke"];
            const targetBranch = "release/aws-observability";
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const listRunsForSha = async (sha) => {
              const attempts = 5;

              for (let attempt = 1; attempt <= attempts; attempt += 1) {
                try {
                  return await github.paginate(
                    github.rest.actions.listWorkflowRunsForRepo,
                    {
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      head_sha: sha,
                      event: "push",
                      per_page: 100,
                    }
                  );
                } catch (error) {
                  const status = error.status || "unknown";
                  core.warning(
                    `GitHub Actions API lookup failed on attempt ${attempt}/${attempts} for ${sha}: ${status} ${error.message}`
                  );

                  if (attempt === attempts) {
                    throw error;
                  }

                  await sleep(10000);
                }
              }

              return [];
            };

            let sha = context.sha;
            let branch = context.ref.replace("refs/heads/", "");
            let ready = branch === targetBranch;
            let report = [];

            if (context.eventName === "workflow_dispatch") {
              ready = true;
              report = required.map((name) => ({
                name,
                status: "manual-dispatch",
                conclusion: "manual-dispatch",
              }));
            } else if (branch !== targetBranch) {
              ready = false;
            } else {
              const deadline = Date.now() + 20 * 60 * 1000;

              try {
                while (Date.now() < deadline) {
                  const runs = await listRunsForSha(sha);

                  report = required.map((name) => {
                    const matches = runs
                      .filter((run) => run.name === name)
                      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                    const latest = matches[0];

                    return {
                      name,
                      status: latest ? latest.status : "missing",
                      conclusion: latest ? latest.conclusion || "in_progress" : "missing",
                    };
                  });

                  const allCompleted = report.every((item) => item.status === "completed");
                  const allSucceeded = report.every((item) => item.conclusion === "success");
                  const anyFailed = report.some(
                    (item) => item.status === "completed" && item.conclusion !== "success"
                  );

                  if (allCompleted || anyFailed) {
                    ready = allSucceeded;
                    break;
                  }

                  await sleep(15000);
                }
              } catch (error) {
                report = required.map((name) => ({
                  name,
                  status: "api_error",
                  conclusion: "api_error",
                }));
                ready = false;
                core.warning(`Unable to query GitHub Actions workflow status for ${sha}: ${error.message}`);
              }

              if (!report.length || !report.every((item) => item.status === "completed")) {
                ready = false;
              }
            }

            core.setOutput("ready", ready ? "true" : "false");
            core.setOutput("sha", sha);
            core.setOutput("branch", branch);

            await core.summary
              .addHeading("AWS Deploy Gate")
              .addRaw(`Target branch: \`${branch}\`\n\n`)
              .addTable([
                [
                  { data: "Workflow", header: true },
                  { data: "Status", header: true },
                  { data: "Conclusion", header: true },
                ],
                ...report.map((item) => [item.name, item.status || "-", item.conclusion]),
              ])
              .addRaw(`\nReady to deploy: \`${ready}\`\n`)
              .write();

      - name: Stop when upstream workflows are incomplete
        if: steps.check.outputs.ready != 'true'
        run: |
          echo "Required workflows for this commit are not all successful yet."
          echo "This run exits without deploying."

  terraform-plan:
    name: Terraform Plan (AWS)
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.ready == 'true'
    timeout-minutes: 35
    outputs:
      config_version_id: ${{ steps.remote_plan.outputs.config_version_id }}
      workspace_id: ${{ steps.remote_plan.outputs.workspace_id }}
      plan_run_id: ${{ steps.remote_plan.outputs.plan_run_id }}
      plan_run_url: ${{ steps.remote_plan.outputs.plan_run_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.sha || github.sha }}

      - name: Create artifact directory
        run: mkdir -p ci-artifacts/aws-deploy

      - name: Package AWS Terraform configuration
        run: |
          tar \
            --exclude='.terraform' \
            --exclude='*.tfstate' \
            --exclude='*.tfstate.*' \
            -C terraform/environments/aws \
            -czf ci-artifacts/aws-deploy/aws-config.tar.gz \
            .

      - name: Queue remote Terraform plan in HCP Terraform
        id: remote_plan
        run: |
          set -euo pipefail

          python3 .github/scripts/hcp_terraform_api.py workspace-info \
            --organization "$TFC_ORGANIZATION" \
            --workspace "$TFC_WORKSPACE" \
            > ci-artifacts/aws-deploy/workspace.json

          python3 - <<'PY'
          import json
          from pathlib import Path

          workspace = json.loads(Path("ci-artifacts/aws-deploy/workspace.json").read_text())
          if workspace.get("execution_mode") != "remote":
              raise SystemExit(
                  f"HCP Terraform workspace {workspace['name']} must use remote execution mode, "
                  f"got {workspace.get('execution_mode')!r}"
              )
          if workspace.get("operations") is False:
              raise SystemExit(
                  f"HCP Terraform workspace {workspace['name']} has operations disabled."
              )
          PY

          python3 .github/scripts/hcp_terraform_api.py create-config-version \
            --workspace-id "$(python3 -c 'import json; print(json.load(open("ci-artifacts/aws-deploy/workspace.json"))["id"])')" \
            > ci-artifacts/aws-deploy/config-version.json

          python3 .github/scripts/hcp_terraform_api.py upload-config \
            --upload-url "$(python3 -c 'import json; print(json.load(open("ci-artifacts/aws-deploy/config-version.json"))["upload_url"])')" \
            --archive ci-artifacts/aws-deploy/aws-config.tar.gz

          python3 .github/scripts/hcp_terraform_api.py create-run \
            --workspace-id "$(python3 -c 'import json; print(json.load(open("ci-artifacts/aws-deploy/workspace.json"))["id"])')" \
            --config-version-id "$(python3 -c 'import json; print(json.load(open("ci-artifacts/aws-deploy/config-version.json"))["id"])')" \
            --message "GitHub Actions remote plan for ${{ needs.gate.outputs.sha || github.sha }}" \
            --plan-only \
            > ci-artifacts/aws-deploy/plan-run.json

          python3 .github/scripts/hcp_terraform_api.py wait-run \
            --run-id "$(python3 -c 'import json; print(json.load(open("ci-artifacts/aws-deploy/plan-run.json"))["id"])')" \
            --success-status planned_and_finished \
            --timeout 1800 \
            > ci-artifacts/aws-deploy/plan-run-final.json

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          workspace = json.loads(Path("ci-artifacts/aws-deploy/workspace.json").read_text())
          config_version = json.loads(Path("ci-artifacts/aws-deploy/config-version.json").read_text())
          plan_run = json.loads(Path("ci-artifacts/aws-deploy/plan-run.json").read_text())
          plan_run_url = f"https://{os.environ['TFC_HOST'].rstrip('/')}/app/{os.environ['TFC_ORGANIZATION']}/{os.environ['TFC_WORKSPACE']}/runs/{plan_run['id']}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"workspace_id={workspace['id']}\n")
              handle.write(f"config_version_id={config_version['id']}\n")
              handle.write(f"plan_run_id={plan_run['id']}\n")
              handle.write(f"plan_run_url={plan_run_url}\n")
          PY

      - name: Write plan summary
        run: |
          {
            echo "## AWS Terraform Plan Summary"
            echo
            echo "- Branch: \`${{ needs.gate.outputs.branch || github.ref_name }}\`"
            echo "- Commit: \`${{ needs.gate.outputs.sha || github.sha }}\`"
            echo "- HCP Terraform workspace: \`${{ env.TFC_WORKSPACE }}\`"
            echo "- Remote plan run: ${{ steps.remote_plan.outputs.plan_run_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deploy plan logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aws-deploy-plan-logs
          path: ci-artifacts/aws-deploy
          if-no-files-found: error

  terraform-apply:
    name: Terraform Apply (AWS)
    runs-on: ubuntu-latest
    needs:
      - gate
      - terraform-plan
    if: needs.gate.outputs.ready == 'true' && needs.terraform-plan.result == 'success'
    timeout-minutes: 45
    environment: aws

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.sha || github.sha }}

      - name: Create artifact directory
        run: mkdir -p ci-artifacts/aws-apply

      - name: Queue remote Terraform apply in HCP Terraform
        id: remote_apply
        run: |
          set -euo pipefail

          python3 .github/scripts/hcp_terraform_api.py create-run \
            --workspace-id "${{ needs.terraform-plan.outputs.workspace_id }}" \
            --config-version-id "${{ needs.terraform-plan.outputs.config_version_id }}" \
            --message "GitHub Actions remote apply for ${{ needs.gate.outputs.sha || github.sha }}" \
            > ci-artifacts/aws-apply/apply-run.json

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          apply_run = json.loads(Path("ci-artifacts/aws-apply/apply-run.json").read_text())
          apply_run_url = f"https://{os.environ['TFC_HOST'].rstrip('/')}/app/{os.environ['TFC_ORGANIZATION']}/{os.environ['TFC_WORKSPACE']}/runs/{apply_run['id']}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"apply_run_id={apply_run['id']}\n")
              handle.write(f"apply_run_url={apply_run_url}\n")
          PY

          python3 .github/scripts/hcp_terraform_api.py wait-run \
            --run-id "$(python3 -c 'import json; print(json.load(open("ci-artifacts/aws-apply/apply-run.json"))["id"])')" \
            --success-status planned_and_finished \
            --allow-confirmable \
            --timeout 1800 \
            > ci-artifacts/aws-apply/apply-run-wait.json

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          wait_data = json.loads(Path("ci-artifacts/aws-apply/apply-run-wait.json").read_text())
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"awaiting_apply={'true' if wait_data['result'] == 'confirmable' else 'false'}\n")
          if wait_data["result"] == "confirmable":
              raise SystemExit(10)
          PY
        continue-on-error: true

      - name: Fail on unexpected remote apply preparation error
        if: steps.remote_apply.outcome == 'failure' && steps.remote_apply.outputs.awaiting_apply != 'true'
        run: |
          echo "HCP Terraform apply run did not reach a confirmable state."
          exit 1

      - name: Apply confirmable HCP Terraform run
        if: steps.remote_apply.outputs.awaiting_apply == 'true'
        run: |
          set -euo pipefail

          python3 .github/scripts/hcp_terraform_api.py apply-run \
            --run-id "$(python3 -c 'import json; print(json.load(open("ci-artifacts/aws-apply/apply-run.json"))["id"])')"

      - name: Wait for remote Terraform apply completion
        if: steps.remote_apply.outcome == 'success' || steps.remote_apply.outputs.awaiting_apply == 'true'
        run: |
          set -euo pipefail

          python3 .github/scripts/hcp_terraform_api.py wait-run \
            --run-id "$(python3 -c 'import json; print(json.load(open("ci-artifacts/aws-apply/apply-run.json"))["id"])')" \
            --success-status applied,planned_and_finished \
            --timeout 2400 \
            > ci-artifacts/aws-apply/apply-run-final.json

      - name: Write apply summary
        run: |
          {
            echo "## AWS Terraform Apply Summary"
            echo
            echo "- Branch: \`${{ needs.gate.outputs.branch || github.ref_name }}\`"
            echo "- Commit: \`${{ needs.gate.outputs.sha || github.sha }}\`"
            echo "- HCP Terraform workspace: \`${{ env.TFC_WORKSPACE }}\`"
            echo "- Remote apply run: ${{ steps.remote_apply.outputs.apply_run_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload apply logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aws-deploy-apply-logs
          path: ci-artifacts/aws-apply
          if-no-files-found: error
