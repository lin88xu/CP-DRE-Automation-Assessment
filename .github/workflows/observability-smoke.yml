name: Observability Smoke

on:
  push:
    branches:
      - main
      - release/aws-observability
  pull_request:
    branches:
      - main
      - release/aws-observability
    paths:
      - ".github/workflows/observability-smoke.yml"
      - "promethusGrafana/**"
      - "deployment/kong/**"
      - "tests/TP_REMOTE_STACK_VERIFICATION_V001.py"
      - "tests/TP_REMOTE_STACK_VERIFICATION_V001.md"
      - "tests/TP_DASHBOARD_CONTENT_CORRECTNESS_V001.py"
      - "tests/TP_DASHBOARD_CONTENT_CORRECTNESS_V001.md"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Observability Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create artifact directory
        run: mkdir -p ci-artifacts/observability

      - name: Validate Kong compose file
        id: kong_config
        run: |
          docker compose \
            --project-directory deployment/kong \
            -f deployment/kong/docker-compose.yml \
            config > ci-artifacts/observability/kong-compose-config.log

      - name: Validate observability compose file
        id: observability_config
        run: |
          docker compose \
            --project-directory promethusGrafana \
            -f promethusGrafana/docker-compose.yml \
            config > ci-artifacts/observability/observability-compose-config.log

      - name: Start Kong stack
        id: kong_up
        run: |
          docker compose \
            --project-directory deployment/kong \
            -f deployment/kong/docker-compose.yml \
            up -d

      - name: Start observability stack
        id: observability_up
        run: |
          docker compose \
            --project-directory promethusGrafana \
            -f promethusGrafana/docker-compose.yml \
            up -d

      - name: Run local stack verification
        id: local_stack_verification
        env:
          LOAD_AWS_TERRAFORM_OUTPUTS: "false"
          STACK_TARGET: local
          KONG_PROXY_URL: http://127.0.0.1:8000
          KONG_ADMIN_URL: http://127.0.0.1:8001
          GRAFANA_URL: http://127.0.0.1:3000
        run: |
          set -o pipefail
          python3 tests/TP_REMOTE_STACK_VERIFICATION_V001.py 2>&1 | tee ci-artifacts/observability/local-stack-verification.log

      - name: Run dashboard content verification
        id: dashboard_content
        env:
          LOAD_AWS_TERRAFORM_OUTPUTS: "false"
          STACK_TARGET: local
          GRAFANA_URL: http://127.0.0.1:3000
          GRAFANA_USER: admin
          GRAFANA_PASSWORD: admin
          GRAFANA_DATASOURCE_NAME: Prometheus
          EXPECTED_GRAFANA_DATASOURCE_URL: http://prometheus:9090
          EXPECT_PROVISIONED_DASHBOARD: "true"
        run: |
          set -o pipefail
          python3 tests/TP_DASHBOARD_CONTENT_CORRECTNESS_V001.py 2>&1 | tee ci-artifacts/observability/dashboard-content.log

      - name: Record container status
        if: always()
        run: docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' > ci-artifacts/observability/docker-ps.log

      - name: Record Kong logs
        if: always()
        run: |
          docker compose \
            --project-directory deployment/kong \
            -f deployment/kong/docker-compose.yml \
            logs --no-color > ci-artifacts/observability/kong-logs.log || true

      - name: Record observability logs
        if: always()
        run: |
          docker compose \
            --project-directory promethusGrafana \
            -f promethusGrafana/docker-compose.yml \
            logs --no-color > ci-artifacts/observability/observability-logs.log || true

      - name: Write smoke test summary
        if: always()
        env:
          KONG_CONFIG: ${{ steps.kong_config.conclusion }}
          OBSERVABILITY_CONFIG: ${{ steps.observability_config.conclusion }}
          LOCAL_STACK_VERIFICATION: ${{ steps.local_stack_verification.conclusion }}
          DASHBOARD_CONTENT: ${{ steps.dashboard_content.conclusion }}
        run: |
          status_text() {
            if [ "$1" = "success" ]; then
              printf 'PASS'
            elif [ "$1" = "skipped" ] || [ -z "$1" ]; then
              printf 'SKIP'
            else
              printf 'FAIL'
            fi
          }

          {
            echo "## Observability Smoke Test Summary"
            echo
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| Kong compose config | $(status_text "$KONG_CONFIG") |"
            echo "| Observability compose config | $(status_text "$OBSERVABILITY_CONFIG") |"
            echo "| Local stack verification | $(status_text "$LOCAL_STACK_VERIFICATION") |"
            echo "| Dashboard content verification | $(status_text "$DASHBOARD_CONTENT") |"
            echo
            echo "Artifacts: \`observability-smoke-logs\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observability-smoke-logs
          path: ci-artifacts/observability
          if-no-files-found: error

      - name: Stop Kong stack
        if: always()
        run: |
          docker compose \
            --project-directory deployment/kong \
            -f deployment/kong/docker-compose.yml \
            down -v

      - name: Stop observability stack
        if: always()
        run: |
          docker compose \
            --project-directory promethusGrafana \
            -f promethusGrafana/docker-compose.yml \
            down -v
