_format_version: "3.0"
_transform: true

services:
  - name: sample-service
    url: http://httpbin.org
    routes:
      - name: sample-route
        hosts:
          - example.com
        paths:
          - /
        methods:
          - GET
          - POST

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
  - name: prometheus

